name: Refresh feed

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-feed
  cancel-in-progress: false

jobs:
  refresh-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}

      - name: Verify no client-side JavaScript
        run: |
          set -euo pipefail

          if find dist -type f -name "*.js" | grep -q .; then
            echo "Unexpected JavaScript files found in dist" >&2
            find dist -type f -name "*.js" >&2
            exit 1
          fi

          if grep -n "<script" dist/index.html; then
            echo "Unexpected script tag found in dist/index.html" >&2
            exit 1
          fi

          if grep -n 'type="module"' dist/index.html; then
            echo "Unexpected module script found in dist/index.html" >&2
            exit 1
          fi

          if grep -n "assets/index" dist/index.html; then
            echo "Unexpected Vite bundle reference found in dist/index.html" >&2
            exit 1
          fi

      - name: Commit refreshed feed
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/live-feed.json data/site-traffic.json index.html dist/index.html dist/omnifix-github-avatar-round-o.png

          if git diff --cached --quiet; then
            echo "No feed or dist changes to commit."
          else
            git commit -m "chore: refresh live engineering feed"
            git push origin HEAD:main
          fi
